<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">

<style>
.box {
  fill: #f8fafc;
  stroke: #1f2937;
  stroke-width: 2;
  rx: 14;
}
.textTitle {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 20px;
  fill: #111827;
  font-weight: 600;
  text-anchor: middle;
}
.textSub {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 14px;
  fill: #6b7280;
  text-anchor: middle;
}
.arrow {
  stroke: #374151;
  stroke-width: 2;
  marker-end: url(#arrow);
}
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5"
markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
</marker>
</defs>

<!-- Design Tokens -->
<rect class="box" x="250" y="40" width="400" height="80"/>
<text class="textTitle" x="450" y="75">Design Tokens</text>
<text class="textSub" x="450" y="100">colors / spacing / typography</text>

<!-- Arrow -->
<line class="arrow" x1="450" y1="120" x2="450" y2="160"/>

<!-- Primitive Components -->
<rect class="box" x="250" y="160" width="400" height="80"/>
<text class="textTitle" x="450" y="195">Primitive Components</text>
<text class="textSub" x="450" y="220">button / input / card</text>

<!-- Arrow -->
<line class="arrow" x1="450" y1="240" x2="450" y2="280"/>

<!-- Composed Components -->
<rect class="box" x="250" y="280" width="400" height="80"/>
<text class="textTitle" x="450" y="315">Composed Components</text>
<text class="textSub" x="450" y="340">modal / form / navbar</text>

<!-- Arrow -->
<line class="arrow" x1="450" y1="360" x2="450" y2="400"/>

<!-- Product Screens -->
<rect class="box" x="250" y="400" width="400" height="80"/>
<text class="textTitle" x="450" y="435">Product Screens</text>
<text class="textSub" x="450" y="460">dashboard / settings / checkout</text>

</svg>